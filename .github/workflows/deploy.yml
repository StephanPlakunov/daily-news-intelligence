name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build backend bundle
        run: npm run build:backend

      - name: Build infrastructure
        run: npm run build:infrastructure

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Deploy CDK stack
        working-directory: infrastructure
        run: >
          npx cdk deploy
          --require-approval never
          -c newsApiSecretArn=${{ secrets.NEWS_API_SECRET_ARN }}
          -c claudeApiSecretArn=${{ secrets.CLAUDE_API_SECRET_ARN }}

      - name: Read stack outputs
        id: stack_outputs
        shell: bash
        run: |
          API_BASE_URL=$(aws cloudformation describe-stacks \
            --stack-name NewsDigestStack \
            --query "Stacks[0].Outputs[?OutputKey=='ApiBaseUrl'].OutputValue" \
            --output text)
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name NewsDigestStack \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          FRONTEND_DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name NewsDigestStack \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" \
            --output text)
          FRONTEND_URL=$(aws cloudformation describe-stacks \
            --stack-name NewsDigestStack \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendUrl'].OutputValue" \
            --output text)

          echo "api_base_url=$API_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "frontend_distribution_id=$FRONTEND_DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$FRONTEND_URL" >> "$GITHUB_OUTPUT"

      - name: Build frontend bundle
        run: npm run build:frontend
        env:
          VITE_API_BASE_URL: ${{ steps.stack_outputs.outputs.api_base_url }}

      - name: Upload frontend assets
        run: aws s3 sync frontend/dist s3://${{ steps.stack_outputs.outputs.frontend_bucket }} --delete

      - name: Invalidate CloudFront cache
        run: >
          aws cloudfront create-invalidation
          --distribution-id ${{ steps.stack_outputs.outputs.frontend_distribution_id }}
          --paths "/*"

      - name: Deployment summary
        run: |
          echo "API base URL: ${{ steps.stack_outputs.outputs.api_base_url }}"
          echo "Frontend URL: ${{ steps.stack_outputs.outputs.frontend_url }}"
